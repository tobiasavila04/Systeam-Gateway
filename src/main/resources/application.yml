server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # ─── Auth Service (Ulises) ───
        # Login, registro, etc. NO necesita JWT
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        # ─── Project Service (nosotros) ───
        # Necesita JWT -> pasa por el filtro JwtAuth
        - id: project-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/projects/**
          filters:
            - JwtAuth

        # ─── Wallet Service (futuro) ───
        # - id: wallet-service
        #   uri: http://localhost:8083
        #   predicates:
        #     - Path=/api/wallet/**
        #   filters:
        #     - JwtAuth

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8080}
