server:
  port: 8989

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # ─── Auth Service (Ulises) ───
        # Login, registro, etc. NO necesita JWT
        # Path=/auth/** cubre las llamadas desde el Vite proxy (envia /auth/login)
        # Path=/api/auth/** cubre llamadas con prefijo /api (uso futuro)
        - id: auth-service
          uri: ${USER_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/auth/**,/api/auth/**,/oauth2/**,/login/oauth2/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /auth/$\{segment}

        # Búsqueda de usuarios por nombre (solo autenticado) — en Project Service
        - id: user-search-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/search
          filters:
            - JwtAuth

        # Usuarios, roles, permisos — también en Auth Service
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/api/users/**
        - id: role-service
          uri: ${USER_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/api/roles/**
        - id: permission-service
          uri: ${USER_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/api/permissions/**

        # ─── Project Service (nosotros) ───
        # Contiene: Proyectos, Inversión, Tokenización, Wallet, etc.
        - id: project-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/projects/**
          filters:
            - JwtAuth

        # ─── Tokenización Service ───
        - id: tokenization-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/tokens/**
          filters:
            - JwtAuth

        # ─── Investment Service ───
        - id: investment-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/investments/**
          filters:
            - JwtAuth

        # ─── Marketplace Service ───
        - id: marketplace-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/marketplace/**
          filters:
            - JwtAuth

        # ─── Dividend Service ───
        - id: dividend-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/dividends/**,/api/dividendos/**
          filters:
            - JwtAuth

        # ─── Wallet Service ───
        - id: wallet-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/wallet/**
          filters:
            - JwtAuth

        # ─── Voting & Rewards Service ───
        - id: voting-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/voting/**,/api/rewards/**
          filters:
            - JwtAuth

        # ─── Dashboard Service ───
        - id: dashboard-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/dashboard/**
          filters:
            - JwtAuth

        # ─── Insurance & Backing Service ───
        - id: insurance-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/insurance/**
          filters:
            - JwtAuth

        # ─── AI Service ───
        - id: ai-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/ai/**
          filters:
            - JwtAuth

        # ─── Notification Service ───
        - id: notification-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/notifications/**
          filters:
            - JwtAuth

        # ─── Blockchain Service ───
        - id: blockchain-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/blockchain/**
          filters:
            - JwtAuth

        # ─── Modules Status Service ───
        - id: modules-status-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/modules/**

        # ─── Oracle Billing Service ───
        - id: oracle-service
          uri: ${PROJECT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/oracle/**
          filters:
            - JwtAuth

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
        - RemoveRequestHeader=Origin

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "https://project-1944cf83-7f15-4f33-89b.web.app"
              - "http://34.149.87.215.nip.io"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

auth:
  service:
    url: ${AUTH_SERVICE_URL:${USER_SERVICE_URL:http://localhost:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
