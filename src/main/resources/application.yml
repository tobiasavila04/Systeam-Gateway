server:
  port: 8989

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # ─── Auth Service (Ulises) ───
        # Login, registro, etc. NO necesita JWT
        # Path=/auth/** cubre las llamadas desde el Vite proxy (envia /auth/login)
        # Path=/api/auth/** cubre llamadas con prefijo /api (uso futuro)
        - id: auth-service
          uri: http://localhost:8080
          predicates:
            - Path=/auth/**,/api/auth/**

        # Usuarios, roles, permisos — también en Auth Service
        - id: user-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/users/**
        - id: role-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/roles/**
        - id: permission-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/permissions/**

        # ─── Project Service (nosotros) ───
        # Contiene: Proyectos, Inversión, Tokenización, Wallet, etc.
        - id: project-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/projects/**
          filters:
            - JwtAuth

        # ─── Tokenización Service ───
        - id: tokenization-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/tokens/**
          filters:
            - JwtAuth

        # ─── Investment Service ───
        - id: investment-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/investments/**
          filters:
            - JwtAuth

        # ─── Marketplace Service ───
        - id: marketplace-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/marketplace/**
          filters:
            - JwtAuth

        # ─── Dividend Service ───
        - id: dividend-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/dividends/**
          filters:
            - JwtAuth

        # ─── Wallet Service ───
        - id: wallet-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/wallet/**
          filters:
            - JwtAuth

        # ─── Voting & Rewards Service ───
        - id: voting-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/voting/**,/api/rewards/**
          filters:
            - JwtAuth

        # ─── Dashboard Service ───
        - id: dashboard-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/dashboard/**
          filters:
            - JwtAuth

        # ─── Insurance & Backing Service ───
        - id: insurance-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/insurance/**
          filters:
            - JwtAuth

        # ─── AI Service ───
        - id: ai-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/ai/**
          filters:
            - JwtAuth

        # ─── Notification Service ───
        - id: notification-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/notifications/**
          filters:
            - JwtAuth

        # ─── Blockchain Service ───
        - id: blockchain-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/blockchain/**
          filters:
            - JwtAuth

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000,http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8080}
